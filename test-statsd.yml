---
- name: test-statsd
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  vars:

    env: null
    statsd_host: null
    statsd_port: 9125
    statsd_protocol: tcp
    metrics_port: 9102

  tasks:

    - name: Test StatsD Job Template counter
      ansible.builtin.include_role:
        name: test
        tasks_from: statsd-jobtemplate-counter.yml

    - name: Test StatsD Job Template gauge
      ansible.builtin.include_role:
        name: test
        tasks_from: statsd-jobtemplate-gauge.yml

    - name: Test StatsD Workflow counter
      ansible.builtin.include_role:
        name: test
        tasks_from: statsd-workflow-counter.yml

    - name: Test StatsD Workflow gauge
      ansible.builtin.include_role:
        name: test
        tasks_from: statsd-workflow-gauge.yml
